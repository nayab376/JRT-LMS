<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JRT SYSTEM | Sign In</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/">JRT <span>System</span></a>
  <ul class="nav-links">
    <li><a href="/">🏠 Home</a></li>
    <li><a href="#">📋 Courses ▾</a></li>
    <li><a href="#">ℹ️ About Us</a></li>
    <li><a href="#">✉️ Contact</a></li>
    <li><a href="#">🖥️ Online Tutoring (Free Trial)</a></li>
  </ul>
  <div class="nav-right">
    <a class="btn-primary" href="/signup">Join Now</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Sign In</h2>
    <p class="subtitle">Please enter your credentials to access your account</p>

    <label class="field-label" for="email">Email Address</label>
    <input class="field-input" type="email" id="email" placeholder="you@example.com"/>

    <label class="field-label" for="password">Password</label>
    <input class="field-input" type="password" id="password" placeholder="••••••••"/>

    <div class="auth-meta">
      <label><input type="checkbox"/> Remember me</label>
      <a href="#">Forgot password?</a>
    </div>

    <div class="error-box" id="err"></div>

    <button class="btn-primary btn-full" id="login-btn" onclick="handleLogin()">Sign In</button>

    <p class="auth-footer">Don't have an account? <a href="/signup">Create an account</a></p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) return showError('err', 'Please fill in all fields.');

    setLoading('login-btn', true);
    const data = await API.post('/api/login', { email, password });
    setLoading('login-btn', false);

    if (data.error) return showError('err', data.error);

    // Redirect based on role
    if (data.user.role === 'instructor') {
      window.location.href = '/dashboard';
    } else {
      window.location.href = '/dashboard';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
